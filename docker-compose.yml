services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: geographie_web
    ports:
      - "8000:8000"
    environment:
      DJANGO_DEBUG: "True"
      DJANGO_ALLOWED_HOSTS: "localhost,127.0.0.1"
      DJANGO_SECRET_KEY: "change-me-in-production"
    volumes:
      - ./:/app
    restart: unless-stopped
