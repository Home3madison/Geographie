{% extends 'base.html' %}

{% block title %}Карта Кыргызстана{% endblock %}

{% block content %}
<h1 class="h3 mb-3">Карта Кыргызстана</h1>
<p class="text-muted">Ниже встроена Google-карта для визуального изучения страны.</p>

<div class="card shadow-sm">
    <div class="card-body">
        <div class="ratio ratio-16x9">
            <iframe src="https://www.google.com/maps?q=Kyrgyzstan&output=embed" style="border:0;" allowfullscreen loading="lazy"></iframe>
        </div>
    </div>
</div>
{% endblock %}
